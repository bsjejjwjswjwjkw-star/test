<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Все про дітей</title>

<style>

</style>
</head>

<body>

<section class="hero">
    <h1 id="main-title">Все про дітей, все для батьків!</h1>
    <p id="sub-text"></p>
</section>

<section class="content-section">
    <div class="container">
        
        <div class="sidebar">
            <div class="card">
                <h3>Категорія</h3>
                <p>Виховання</p>
                <p>Психологія</p>
                <p>Здоров’я</p>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Стаття 1</h2>
                <p>Тут буде текст статті...</p>
            </div>

            <div class="card" style="margin-top:20px;">
                <h2>Стаття 2</h2>
                <p>І тут теж буде текст статті...</p>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3>Реклама</h3>
                <p>Бепантен</p>
            </div>
        </div>

    </div>
</section>

<script>
const subText = document.getElementById("sub-text");

const description = "На цьому сайті ви знайдете корисні статті про виховання, психологію дітей, здоров’я та розвиток. Матеріали створені для турботливих батьків.";

function startSubText() {
    subText.classList.add("show");

    let index = 0;
    function typeDescription() {
        if (index < description.length) {
            subText.textContent += description.charAt(index);
            index++;
            setTimeout(typeDescription, 35);
        }
    }

    typeDescription();
}

window.onload = function() {
    setTimeout(startSubText, 2300);
};

</script>

</body>
</html>
